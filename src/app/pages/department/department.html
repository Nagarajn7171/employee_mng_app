<div class="container py-4">
  <h2 class="mb-4 text-center">Department Management</h2>

  <!-- form card -->
  <div class="card mb-4 animated fadeIn">
    <div class="card-body">
      <form #deptForm="ngForm" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Department Name</label>
          <input
            type="text"
            class="form-control"
            required
            [(ngModel)]="deptObj.DepartmentName"
            name="name"
            placeholder="Enter name"
          />
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="activeCheck"
            [(ngModel)]="deptObj.IsActive"
            name="active"
          />
          <label class="form-check-label" for="activeCheck">
            Active
          </label>
        </div>
        <button type="submit" class="btn btn-success">
          {{ deptObj.DeptId }}
        </button>
        <button
          type="button"
          class="btn btn-secondary ms-2"
          (click)="reset()">
          Clear
        </button>
      </form>
    </div>
  </div>

  <!-- list card -->
  <div class="card animated fadeInUp">
    <div class="card-body">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Active</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
            @for(item of deptList();track $index){
           <tr>
            <td>{{ item.DeptId }}</td>
            <td>{{ item.DepartmentName }}</td>
            <td>
              <input type="checkbox" [checked]="item.IsActive" disabled />
            </td>
            <td>
              <button
                class="btn btn-sm btn-primary me-1"
                (click)="edit(item.DeptId)">
                Edit
              </button>
              <button
                class="btn btn-sm btn-danger"
                (click)="delete(item.DeptId)">
                Delete
              </button>
            </td>
          </tr>
            }
          
        </tbody>
      </table>
      <p *ngIf="deptList.length === 0" class="text-muted text-center">
        No departments yet.
      </p>
    </div>
  </div>
</div>
